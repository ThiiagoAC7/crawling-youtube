[workspace]
channels = ["conda-forge"]
name = "coletor-youtube"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
main = "python main.py"
transcript = "python transcriptions/transcript.py"

[dependencies]
python = "3.12.*"
pandas = ">=2.3.3,<3"
numpy = ">=2.3.5,<3"
google-api-python-client = ">=2.187.0,<3"
google-auth-oauthlib = ">=1.2.3,<2"
google-auth-httplib2 = ">=0.2.1,<0.3"
tqdm = ">=4.67.1,<5"
transformers = ">=4.57.3,<5"

[pypi-dependencies]
python-dotenv = ">=1.2.1, <2"
isodate = ">=0.7.2, <0.8"
yt-dlp = { version = ">=2025.11.12, <2026", extras = ["default"] }
openai-whisper = ">=20250625, <20250626"
torch = ">=2.9.1, <3"
bertopic = ">=0.17.4, <0.18"
sentence-transformers = ">=5.1.2, <6"
